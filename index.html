<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Flix Talk</title>
  </head>
  <body>
    <!-- 맨 위 상단 -->
    <div class="status-bar">
      <div class="status-bar__column">
        <span>09:21</span>
      </div>

      <div class="status-bar__column">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full fa-lg"></i>
      </div>
    </div>

    <!-- 로그인 화면 -->
    <header class="welcome-header">
      <h1 class="welcome-header__title">
        <span class="welcome-header__title__welcometo">Welcome to</span>
        <span class="welcome-header__title__flix">Flix</span>
        <span class="welcome-header__title__talk">Talk</span>
      </h1>
      <p class="welcome-header__text">
        If you have a <em>Flix Talk</em> Account, log in with your email or
        phone number.
      </p>
    </header>

    <form action="html/programs.html" method="get" id="login-form">
      <input type="text" placeholder="Email or phone number" />
      <input type="text" placeholder="Password" />
      <input type="submit" value="Log In" />
      <a href="#">Find <em>Flix Talk</em> Account or Password</a>
    </form>

    <!-- 스플래시 화면 -->
    <div id="splash-screen">
      <img
        src="image/flix_talk.png"
        alt="FlixTalk Image"
        class="resized-image"
      />
    </div>

    <!-- 웹으로 볼 시, 스크린 사이즈 크다고 경고 메세지 -->
    <div class="no-mobile">
      <span>Your screen is too big.</span>
    </div>

    <script
      src="https://kit.fontawesome.com/43e594d4c5.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
